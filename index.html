<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Catch Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #7dd3fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            cursor: none;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");


let score = 0;
let lives = 3;
let timeLeft = 30;
let gameOver = false;
let timerInterval;

const itemSize = 110;
const fallingItems = [];
let spawnTimer = 0;
let spawnRate = 40;

const basket = {
    x: 0,
    y: 0,
    width: 200,
    height: 110
};


const basketImg = new Image();
basketImg.src = "imgs/basket.png";

const bombImg = new Image();
bombImg.src = "imgs/bomb.png";

// Map fruit sources to Image objects directly
const fruitImages = [
    "imgs/apple.png",
    "imgs/dragon fruit.png",
    "imgs/banana.png",
    "imgs/guava.png",
    "imgs/grapes.png",
    "imgs/strawberry.png",
    "imgs/watermelon.png"
].map(src => {
    const img = new Image();
    img.src = src;
    return img;
});

// Handle layout & resizing
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height - 150; 
    
    // Keep basket in bounds if resizing narrows the screen
    if (basket.x > canvas.width - basket.width) {
        basket.x = canvas.width - basket.width;
    }
}

function spawnItem() {
    const isBomb = Math.random() < 0.35; // ~35% drop rate for bombs
    let itemImage, itemType;

    if (isBomb) {
        itemType = 'bomb';
        itemImage = bombImg;
    } else {
        itemType = 'fruit';
        itemImage = fruitImages[Math.floor(Math.random() * fruitImages.length)];
    }

    fallingItems.push({
        x: Math.random() * (canvas.width - itemSize),
        y: -itemSize,
        type: itemType,
        img: itemImage,
        speed: 4 + Math.random() * 4
    });
}

function update() {
    if (gameOver) return;

    spawnTimer++;
    if (spawnTimer >= spawnRate) {
        spawnItem();
        spawnTimer = 0;
    }

    // Loop backwards so splicing doesn't skip indexes
    for (let i = fallingItems.length - 1; i >= 0; i--) {
        let item = fallingItems[i];
        item.y += item.speed;

        // AABB Collision checking
        if (item.y + itemSize >= basket.y &&
            item.y <= basket.y + basket.height &&
            item.x + itemSize >= basket.x &&
            item.x <= basket.x + basket.width) {
            
            if (item.type === 'fruit') {
                score++;
            } else {
                lives--;
            }
            fallingItems.splice(i, 1);
            checkGameOver();
            continue;
        }

        // Drop out of frame handling
        if (item.y > canvas.height) {
            if (item.type === 'fruit') {
                lives--; // Missed fruit costs a life
            }
            fallingItems.splice(i, 1);
            checkGameOver();
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Green floor
    ctx.fillStyle = "#4ade80";
    ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

    // Draw player basket
    ctx.drawImage(basketImg, basket.x, basket.y, basket.width, basket.height);
    
    // Draw fruits & bombs
    fallingItems.forEach(item => {
        ctx.drawImage(item.img, item.x, item.y, itemSize, itemSize);
    });

    // Scoreboard UI
    ctx.fillStyle = "#0f172a";
    ctx.font = "bold 28px sans-serif";
    ctx.fillText(`Score: ${score}`, 30, 50);
    ctx.fillText(`Lives: ${"❤️".repeat(Math.max(0, lives))}`, 30, 95);
    ctx.fillText(`Time Left: ${timeLeft}s`, canvas.width - 220, 50);

    // End game state overlay
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 50px sans-serif";
        ctx.textAlign = "center";

        const msg = (lives <= 0) ? "Game Over!" : "Time's Up!";
        ctx.fillText(msg, canvas.width / 2, canvas.height / 2 - 30);

        ctx.font = "30px sans-serif";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
        
        ctx.fillStyle = "#38bdf8";
        ctx.fillText("Click Anywhere to Play Again", canvas.width / 2, canvas.height / 2 + 90);
        ctx.textAlign = "left"; 
    }
}

function checkGameOver() {
    if (lives <= 0) endGame();
}

function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
}

function startTimer() {
    timerInterval = setInterval(() => {
        if (!gameOver) {
            timeLeft--;
            if (timeLeft <= 0) endGame();
        }
    }, 1000);
}

function resetGame() {
    score = 0;
    lives = 3;
    timeLeft = 30;
    fallingItems.length = 0;
    spawnTimer = 0;
    gameOver = false;
    clearInterval(timerInterval);
    startTimer();
}


function tick() {
    update();
    draw();
    requestAnimationFrame(tick);
}

window.addEventListener('resize', resizeCanvas);

window.addEventListener("mousemove", (e) => {
    basket.x = e.clientX - basket.width / 2;

    if (basket.x < 0) basket.x = 0;
    if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
});

window.addEventListener("click", () => {
    if (gameOver) resetGame();
});


resizeCanvas();
startTimer();
tick();
</script>
</body>
</html>
