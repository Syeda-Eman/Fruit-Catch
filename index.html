<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Catch</title>
    <style>
        body, html{
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #7dd3fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas{
            display: block;
            cursor: none;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById|("gameCanvas");
const ctx = canvas.getContext("2d");
let score=0;
let live = 3;
let gameOver = false;
let gameInterval;
let timerInterval;
const basketImg = new Image();
basketImg.src = "apple-Photoroom.png";
const goodAppleImg = new Image();
goodAppleImg.src="good apple-Photoroom.png";
const badAppleImg = new Image();
badAppleImg.src = "bad apple-Photoroom.png";
const appleSize = 110;
const basket = {
    x: 0,
    y: 0,
    width: 200,
    height: 110
};

const apples = [];
let spawnTimer = 0;
let spawnRate = 40;
function resizeCanvas() {
    canvas.width= window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height -150;
    if (basket.x > canvas.width - basket.width){
        basket.x = canvas.width - basket.width;
    }
}
window.addEventListener('resize', resizeCanvas);
recizeCanvas();
window.addEventListener("mousemove", (e)=> {
    basket.x = e.clientX - basket.width/2;
    if (basket.x < 0) basket.x = 0;
    if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
});
window.addEventListener("click",()=>{
    if(gameOver){
        resetGame();
    }
});
function spawnApple(){
    const isGood = Math.random()>0.4;
    apples.push({
        x: Math.random()*(canvas.width-appleSize),
        y: -appleSize,
        type: isGood ? 'good':'bad',
        speed: 4+Math.random()*4
    });
}
function update(){
    if (gameOver) return;
    spawnTimer++;
    if(spawnTimer >= spawnRate){
        spawnApple();
        spawnTimer=0;
    }
    for (let i= apples.length-1; i>=0; i--){
        let a = apples[i];
        a.y += a.speed;
        if (a.y + appleSize >= basket.y &&
            a.y <= basket.y + baket.height &&
            a.x + appleSize >= basket.x &&
            a.x <= baket.x + basket.width){
            if (a.type === 'good'){
                score++;
            } else {
                lives--;
            }
            apples.splice(i, 1);
            checkGameOver();
            continue;
        }
        if (a.y > canvas.height){
            if (a.type === 'good'){
                lives--;
            }
            apples.splice(i, 1);
            checkGameOver();
        }
    }
}
function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#4ade80";
    ctx.fillRect(0, canvas.height -60, canvas.width, 60);

    ctx.drawImage(basketImg, basket.x, basket.y, basket.width, basket.height);
    apples.forEach(a=>{
        const img = (a.type==='good')? goodAppleImg: badAppleImg;
        ctx.drawImage(img, a.x, a.y, appleSize, appleSize);
    });
    ctx.fillStyle="#0f172a";
    ctx.font = "bold 28px sans-serif";
    ctx.fillText(`Score: ${score}`, 30, 50);
    ctx.fillText(`Lives: ${"❤️".repeat(Math.max(0, lives))}`, 30, 95);
    ctx.fillText(`Time Left: ${timmLeft}s`, canvas.width, canvas.width - 220, 50);

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 50px sans-serif";
        ctx.textAlign = "center";

        if (lives <= 0) {
            ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 30);
        } else {
            ctx.fillText("Time's Up!", canvas.width / 2, canvas.height / 2 - 30);
        }

        ctx.font = "30px sans-serif";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
        ctx.fillStyle = "#38bdf8";
        ctx.fillText("Click Anywhere to play Again", canvas.width / 2, canvas.height / 2 + 90);
        ctx.textAlign = "left";
    }
}

function checkGameOver () {
    if (lives <= 0) {
        endGame();
    }
}

function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
}

function startTimer() {
    timerInterval = setInterval(() => {
        if (!gameOver) {
            timeLeft--;
            if (timeLeft <= 0) {
                endGame();
            }
        }
    }, 1000);
}

function resetGame() {
    score = 0;
    lives = 3;
    timeLeft = 30;
    apples.length = 0;
    spawnTimer = 0;
    gameOver = false;
    clearInterval(timerInterval);
    startTimer();
}
function resetGame(){
    score = 0;
    lives= 3;
    timeLeft=30;
    apples.length=0;
    spawnTimer=0;
    gameOver=false;
    clearInterval(timerInterval);
    startTimer();
}
function tick() {
    update();
    draw();
    requestAnimationFrame(tick);
}
startTimer();
tick();
</script>
</body>
</html>
